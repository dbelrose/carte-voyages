<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte de vie – Voyages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link

 amily: Arial, sans-serif; }
    #container { display: flex; height: 100vh; }
    #map { flex: 1; }

    #sidebar {
      width: 300px;
      padding: 12px;
      background: #f8f8f8;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    h2 { margin-top: 0; }

    .place-item {
      cursor: pointer;
      padding: 4px 0;
    }
    .place-item:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="sidebar">
    <h2>🌍 Carte de vie</h2>
    <p><strong id="counter"></strong></p>

    <h3>Filtres</h3>
    <label><input type="checkbox" checked data-region="Europe"> Europe</label><br>
    <label><input type="checkbox" checked data-region="Pacifique"> Pacifique</label><br>
    <label><input type="checkbox" checked data-region="Amériques"> Amériques</label><br>
    <label><input type="checkbox" checked data-region="Afrique"> Afrique</label>

    <h3>📍 Lieux visités</h3>
    <ul id="places-list"></ul>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
