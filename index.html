<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte de vie – Voyages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
  
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #container { display: flex; height: 100vh; }
    #map { flex: 1; }

    #sidebar {
      width: 300px;
      padding: 12px;
      background: #f8f8f8;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    h2 { margin-top: 0; }

    .place-item {
      cursor: pointer;
      padding: 4px 0;
    }
    .place-item:hover {
      text-decoration: underline;
    }

    /* Bouton menu (mobile) */
    #menu-toggle {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    
    /* Mobile portrait */
    @media (max-width: 768px) {
      #container {
        flex-direction: column;
      }
    
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 80%;
        max-width: 320px;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 999;
      }
    
      #sidebar.open {
        transform: translateX(0);
      }
    
      #map {
        flex: 1;
      }
    
      #menu-toggle {
        display: block;
      }
    }
    
  </style>
</head>

<body>

  <button id="menu-toggle">☰ Lieux visités</button>

<div id="container">
  <div id="sidebar">
    <h2>🌍 Carte de vie</h2>
    <p><strong id="counter"></strong></p>

    <h3>Filtres</h3>
    <label><input type="checkbox" checked data-region="Europe"> Europe</label><br>
    <label><input type="checkbox" checked data-region="Pacifique"> Pacifique</label><br>
    <label><input type="checkbox" checked data-region="Amériques"> Amériques</label><br>
    <label><input type="checkbox" checked data-region="Afrique"> Afrique</label>

    <h3>📍 Lieux visités</h3>
    <div id="places-list"></div>
  </div>

  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
  /* =========================
     Initialisation de la carte
  ========================== */
  const map = L.map("map").setView([5, -30], 2);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "© OpenStreetMap"
  }).addTo(map);

  /* =========================
     Configurations
  ========================== */
  const colors = {
    Europe: "#1f77b4",
    Pacifique: "#2ca02c",
    Amériques: "#ff7f0e",
    Afrique: "#d62728"
  };

  const regionBounds = {
    Europe: [[35, -10], [60, 30]],
    Afrique: [[-30, -20], [40, 60]],
    Amériques: [[-60, -140], [60, -30]],
    Pacifique: [[-40, -180], [20, 180]]
  };

  const polynesieFr = [
    "Bora Bora", "Moorea", "Huahine", "Raiatea", "Maupiti",
    "Tetiaroa", "Rangiroa", "Fakarava", "Manihi",
    "Nuku-Hiva", "Rurutu"
  ];

  /* =========================
     Données
  ========================== */
  const places = [
    ["France", 46.2, 2.2, "Europe", "Pays"],
    ["Suisse", 46.8, 8.3, "Europe", "Pays"],
    ["Belgique", 50.85, 4.35, "Europe", "Pays"],
    ["Luxembourg", 49.8, 6.1, "Europe", "Pays"],
    ["Allemagne", 51.0, 10.0, "Europe", "Pays"],
    ["Espagne", 40.4, -3.7, "Europe", "Pays"],
    ["Grèce", 39.0, 22.0, "Europe", "Pays"],
    ["Angleterre", 52.3, -1.5, "Europe", "Pays"],

    ["Tunisie", 33.9, 9.5, "Afrique", "Pays"],
    ["Tchad", 15.4, 18.7, "Afrique", "Pays"],
    ["Réunion", -21.1, 55.5, "Afrique", "Île"],
    ["Madagascar", -18.7, 46.9, "Afrique", "Pays"],

    ["Canada", 56.1, -106.3, "Amériques", "Pays"],
    ["Los Angeles", 34.05, -118.25, "Amériques", "Ville"],
    ["San Francisco", 37.77, -122.42, "Amériques", "Ville"],
    ["Miami", 25.76, -80.19, "Amériques", "Ville"],
    ["Guadeloupe", 16.25, -61.58, "Amériques", "Île"],
    ["Les Saintes", 15.86, -61.58, "Amériques", "Île"],
    ["La Désirade", 16.32, -61.06, "Amériques", "Île"],
    ["Martinique", 14.64, -61.02, "Amériques", "Île"],

    ["Tahiti", -17.40, -149.28, "Pacifique", "Île"],
    ["Moorea", -17.54, -149.83, "Pacifique", "Île"],
    ["Huahine", -16.73, -151.02, "Pacifique", "Île"],
    ["Bora Bora", -16.50, -151.74, "Pacifique", "Île"],
    ["Raiatea", -16.82, -151.44, "Pacifique", "Île"],
    ["Maupiti", -16.43, -152.25, "Pacifique", "Île"],
    ["Tetiaroa", -17.0, -149.58, "Pacifique", "Île"],
    ["Rangiroa", -14.3, -147.68, "Pacifique", "Île"],
    ["Fakarava", -16.05, -145.63, "Pacifique", "Île"],
    ["Manihi", -14.43, -146.03, "Pacifique", "Île"],
    ["Nuku-Hiva", -8.87, -140.1, "Pacifique", "Île"],
    ["Rurutu", -22.45, -151.34, "Pacifique", "Île"],
    ["Aitutaki", -18.85, -159.76, "Pacifique", "Île"],
    ["Nouvelle-Calédonie", -20.9, 165.6, "Pacifique", "Pays"],
    ["Sydney", -33.87, 151.21, "Pacifique", "Ville"]
  ];

  /* =========================
     Icônes
  ========================== */
  const typeIcons = {
    Ville: c => L.divIcon({ html: `<svg fill="${c}" width="20" height="20"><rect x="8" y="6" width="20" height="24"/></svg>`, className: "" }),
    Pays: c => L.divIcon({ html: `<svg fill="${c}" width="20" height="20"><path d="M4 2h2v20H4zM6 2l14 4-14 4z"/></svg>`, className: "" }),
    Île: c => L.divIcon({ html: `<svg fill="${c}" width="20" height="20"><path d="M12 4c4 4 6 7 8 10H4c2-3 4-6 8-10z"/></svg>`, className: "" })
  };

  /* =========================
     Marqueurs
  ========================== */
  const cluster = L.markerClusterGroup();
  const markers = [];

  places.forEach(p => {
    const marker = L.marker([p[1], p[2]], {
      icon: typeIcons[p[4]](colors[p[3]])
    }).bindPopup(`<strong>${p[0]}</strong><br>${p[4]} – ${p[3]}`);

    marker.region = p[3];
    markers.push(marker);
    cluster.addLayer(marker);
  });

  map.addLayer(cluster);

  /* =========================
     Menu Lieux visités (UNE FOIS)
  ========================== */
  function buildPlacesMenu() {
    const container = document.getElementById("places-list");
    container.innerHTML = "";

    const pacifique = document.createElement("details");
    pacifique.open = true;
    pacifique.appendChild(Object.assign(document.createElement("summary"), { textContent: "Pacifique" }));

    const pf = document.createElement("details");
    pf.open = true;
    pf.appendChild(Object.assign(document.createElement("summary"), { textContent: "Polynésie française" }));

    places.forEach(p => {
      const item = document.createElement("div");
      item.textContent = "• " + p[0];
      item.style.cursor = "pointer";
      item.onclick = () => map.setView([p[1], p[2]], 6);

      if (polynesieFr.includes(p[0])) {
        pf.appendChild(item);
      } else if (p[3] === "Pacifique") {
        pacifique.appendChild(item);
      }
    });

    pacifique.appendChild(pf);
    container.appendChild(pacifique);

    ["Europe", "Amériques", "Afrique"].forEach(r => {
      const d = document.createElement("details");
      d.appendChild(Object.assign(document.createElement("summary"), { textContent: r }));

      places.filter(p => p[3] === r).forEach(p => {
        const item = document.createElement("div");
        item.textContent = "• " + p[0];
        item.style.cursor = "pointer";
        item.onclick = () => map.setView([p[1], p[2]], 6);
        d.appendChild(item);
      });

      container.appendChild(d);
    });
  }

  buildPlacesMenu();

  document.getElementById("counter").textContent =
    `✅ ${places.length} lieux visités`;

/* =========================
     Filtres + zoom automatique
  ========================= */
  document
    .querySelectorAll('input[type="checkbox"]')
    .forEach(checkbox => {
      checkbox.addEventListener("change", () => {
        cluster.clearLayers();
  
        const activeRegions = [];
  
        document
          .querySelectorAll('input[type="checkbox"]')
          .forEach(box => {
            if (box.checked) {
              activeRegions.push(box.dataset.region);
  
              markers.forEach(marker => {
                if (marker.region === box.dataset.region) {
                  cluster.addLayer(marker);
                }
              });
            }
          });
  
        // ✅ Zoom automatique uniquement si une seule région est sélectionnée
        if (activeRegions.length === 1) {
          map.fitBounds(regionBounds[activeRegions[0]]);
        }
      });
    });

  /* =========================
       Menu mobile toggle
    ========================= */
    const menuToggle = document.getElementById("menu-toggle");
    const sidebar = document.getElementById("sidebar");
    
    menuToggle.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });
  
</script>
</body>
</html>
